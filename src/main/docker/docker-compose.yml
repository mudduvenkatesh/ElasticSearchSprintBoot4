# =============================================================================
# Elasticsearch 9.x + Kibana — Local Development Stack
# =============================================================================
# Usage:
#   1. Copy .env.example to .env and set your passwords
#   2. docker compose up -d
#   3. Elasticsearch: https://localhost:9200  (or http if SSL disabled)
#      Kibana:         http://localhost:5601
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Init container — runs once to configure the kibana_system user password
  # ---------------------------------------------------------------------------
  setup:
    image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION}
    container_name: es-setup
    volumes:
      - certs:/usr/share/elasticsearch/config/certs
    user: "0"
    command: >
      bash -c '
        echo "Waiting for Elasticsearch to be ready...";
        until curl -s -u "elastic:${ELASTIC_PASSWORD}" \
            http://elasticsearch:9200/_cluster/health \
            | grep -qE "\"status\":\"(green|yellow)\""; do
          sleep 3;
        done;
        echo "Setting kibana_system password...";
        curl -s -X POST -u "elastic:${ELASTIC_PASSWORD}" \
          -H "Content-Type: application/json" \
          http://elasticsearch:9200/_security/user/kibana_system/_password \
          -d "{\"password\":\"${KIBANA_PASSWORD}\"}";
        echo " Done.";
      '
    networks:
      - es-network
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exit 0"]
      interval: 1s
      timeout: 5s
      retries: 120

  # ---------------------------------------------------------------------------
  # Elasticsearch
  # ---------------------------------------------------------------------------
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION}
    container_name: elasticsearch
    environment:
      - node.name=es-local
      - cluster.name=${CLUSTER_NAME}
      - discovery.type=single-node
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false   # plain HTTP for local dev
      - xpack.license.self_generated.type=${LICENSE}
      # Memory settings — tune via ES_JAVA_OPTS in .env
      - ES_JAVA_OPTS=${ES_JAVA_OPTS}
      # Allow Kibana to connect without HTTPS for local dev
      - xpack.security.transport.ssl.enabled=false
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - esdata:/usr/share/elasticsearch/data
    ports:
      - "${ES_PORT}:9200"
    networks:
      - es-network
    healthcheck:
      test:
        - "CMD-SHELL"
        - |
          curl -s -u "elastic:${ELASTIC_PASSWORD}" \
            http://localhost:9200/_cluster/health \
            | grep -qE '"status":"(green|yellow)"'
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 60s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Kibana
  # ---------------------------------------------------------------------------
  kibana:
    image: docker.elastic.co/kibana/kibana:${STACK_VERSION}
    container_name: kibana
    environment:
      - SERVERNAME=kibana
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${KIBANA_PASSWORD}
      - xpack.security.encryptionKey=${KIBANA_ENCRYPTION_KEY}
      - xpack.encryptedSavedObjects.encryptionKey=${KIBANA_ENCRYPTION_KEY}
      - xpack.reporting.encryptionKey=${KIBANA_ENCRYPTION_KEY}
      # Nice for dev: show all features
      - xpack.fleet.enabled=false
    ports:
      - "${KIBANA_PORT}:5601"
    networks:
      - es-network
    depends_on:
      setup:
        condition: service_completed_successfully
    healthcheck:
      test:
        - "CMD-SHELL"
        - "curl -s http://localhost:5601/api/status | grep -q '\"level\":\"available\"'"
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 90s
    restart: unless-stopped

# =============================================================================
# Volumes & Networks
# =============================================================================
volumes:
  esdata:
    driver: local
  certs:
    driver: local

networks:
  es-network:
    driver: bridge
