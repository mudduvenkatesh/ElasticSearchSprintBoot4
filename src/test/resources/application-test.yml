# Connection URL and cloud-id are injected dynamically by ElasticsearchContainerBase
# via @DynamicPropertySource — no localhost:9200 needed here.
elastic:
  cloud:
    cloud-id: ""

app:
  elasticsearch:
    index-name: dq-violation-triage-test
    number-of-shards: 1
    number-of-replicas: 0
    bulk:
      batch-size: 10
      refresh-policy: IMMEDIATE